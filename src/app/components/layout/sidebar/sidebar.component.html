<!-- src/app/components/layout/sidebar/sidebar.component.html -->
<div class="sidebar-container" [class.mobile]="isMobile">
  <button *ngIf="isMobile" class="menu-toggle" (click)="toggleSidebar()" mat-fab color="primary"
          [matTooltip]="isOpen ? ('Fermer le menu' | translate) : ('Ouvrir le menu' | translate)">
    <mat-icon>{{ isOpen ? 'close' : 'menu' }}</mat-icon>
  </button>

  <div *ngIf="isMobile && isOpen" class="overlay" (click)="closeSidebar()"></div>

  <mat-sidenav-container class="sidenav-container" style="height: 100vh; width: 100%;">
    <mat-sidenav
      #sidenav
      [mode]="isMobile ? 'over' : 'side'"
      [opened]="isMobile ? isOpen : true"
      [class.collapsed]="!isMobile && isCollapsed"
      class="sidebar"
      style="height: 100vh;">

      <div class="sidebar-header">
        <div class="logo-container">
          <mat-icon class="logo-icon">account_balance_wallet</mat-icon>
          <span class="logo-text" *ngIf="!isCollapsed || isMobile">SPaye</span>
        </div>
        <button *ngIf="!isMobile" mat-icon-button class="collapse-btn" (click)="toggleSidebar()" 
                [matTooltip]="isCollapsed ? ('Développer' | translate) : ('Réduire' | translate)">
          <mat-icon>{{ isCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        </button>
      </div>

      <mat-divider></mat-divider>

      <div class="user-profile" *ngIf="currentUser">
        <div class="user-avatar">{{ getInitials() }}</div>
        <div class="user-info" *ngIf="!isCollapsed || isMobile">
          <div class="user-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</div>
          <div class="user-role">{{ isAdmin() ? ('Administrateur' | translate) : ('Utilisateur' | translate) }}</div>
        </div>
      </div>

      <mat-divider></mat-divider>

      <mat-nav-list class="nav-list">
        <a *ngFor="let item of menuItems" mat-list-item [routerLink]="item.route" routerLinkActive="active"
           (click)="closeSidebar()" [matTooltip]="isCollapsed && !isMobile ? (item.label | translate) : ''" matTooltipPosition="right">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle *ngIf="!isCollapsed || isMobile">{{ item.label | translate }}</span>
        </a>
      </mat-nav-list>

      <mat-divider></mat-divider>

      <div class="logout-container">
        <button mat-raised-button color="warn" class="logout-btn" (click)="logout()"
                [matTooltip]="isCollapsed && !isMobile ? ('Déconnexion' | translate) : ''" matTooltipPosition="right">
          <mat-icon>exit_to_app</mat-icon>
          <span *ngIf="!isCollapsed || isMobile">{{ 'Déconnexion' | translate }}</span>
        </button>
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="content" style="min-height: 100vh; overflow-y: auto; background: var(--bg);">
      <ng-content></ng-content>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
