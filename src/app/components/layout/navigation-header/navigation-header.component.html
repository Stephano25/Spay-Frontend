<!-- src/app/components/layout/navigation-header/navigation-header.component.html -->
<div class="header-container" [class.admin-header]="isAdmin">
  <div class="header-left">
    <button 
      *ngIf="showBackButton" 
      mat-icon-button 
      [routerLink]="backRoute || (isAdmin ? '/admin' : '/user')"
      class="back-btn"
      [matTooltip]="'Retour' | translate">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>{{ title | translate }}</h1>
  </div>
  
  <div class="header-right">
    <ng-container *ngIf="showExportButton">
      <button 
        mat-icon-button 
        (click)="onExport()" 
        [matTooltip]="'Exporter les paramètres' | translate"
        class="action-btn">
        <mat-icon>download</mat-icon>
      </button>
    </ng-container>

    <ng-container *ngIf="showResetButton">
      <button 
        mat-icon-button 
        (click)="onReset()" 
        [matTooltip]="'Réinitialiser' | translate"
        class="action-btn">
        <mat-icon>settings_backup_restore</mat-icon>
      </button>
    </ng-container>

    <div class="user-info-desktop" *ngIf="user">
      <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
      <div class="user-avatar-small">{{ getInitials() }}</div>
    </div>
    
    <button mat-icon-button [matMenuTriggerFor]="menu" class="profile-btn">
      <mat-icon>account_circle</mat-icon>
    </button>
    
    <mat-menu #menu="matMenu" class="user-menu">
      <div class="menu-header">
        <div class="menu-user-info" *ngIf="user">
          <strong>{{ user.firstName }} {{ user.lastName }}</strong>
          <small>{{ user.email }}</small>
          <span class="role-badge" *ngIf="isAdmin">
            {{ user?.role === 'super_admin' ? ('Super Admin' | translate) : ('Admin' | translate) }}
          </span>
        </div>
      </div>
      <mat-divider></mat-divider>
      
      <ng-container *ngIf="isAdmin">
        <button mat-menu-item routerLink="/admin/dashboard">
          <mat-icon>dashboard</mat-icon>
          <span>{{ 'Dashboard' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/admin/users">
          <mat-icon>people</mat-icon>
          <span>{{ 'Utilisateurs' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/admin/transactions">
          <mat-icon>receipt</mat-icon>
          <span>{{ 'Transactions' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/admin/stats">
          <mat-icon>bar_chart</mat-icon>
          <span>{{ 'Statistiques' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/admin/settings">
          <mat-icon>settings</mat-icon>
          <span>{{ 'Paramètres' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/admin/profile">
          <mat-icon>person</mat-icon>
          <span>{{ 'Mon Profil' | translate }}</span>
        </button>
      </ng-container>
      
      <ng-container *ngIf="!isAdmin">
        <button mat-menu-item routerLink="/user">
          <mat-icon>dashboard</mat-icon>
          <span>{{ 'Tableau de bord' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/wallet">
          <mat-icon>account_balance_wallet</mat-icon>
          <span>{{ 'Portefeuille' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/transactions">
          <mat-icon>swap_horiz</mat-icon>
          <span>{{ 'Transactions' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/friends">
          <mat-icon>people</mat-icon>
          <span>{{ 'Amis' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/chat">
          <mat-icon>chat</mat-icon>
          <span>{{ 'Messages' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/scan-pay">
          <mat-icon>qr_code_scanner</mat-icon>
          <span>{{ 'Scanner' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/mobile-money">
          <mat-icon>phone_android</mat-icon>
          <span>{{ 'Mobile Money' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/stats">
          <mat-icon>bar_chart</mat-icon>
          <span>{{ 'Statistiques' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/profile">
          <mat-icon>person</mat-icon>
          <span>{{ 'Profil' | translate }}</span>
        </button>
        <button mat-menu-item routerLink="/user/settings">
          <mat-icon>settings</mat-icon>
          <span>{{ 'Paramètres' | translate }}</span>
        </button>
      </ng-container>
      
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()" class="logout-item">
        <mat-icon>exit_to_app</mat-icon>
        <span>{{ 'Déconnexion' | translate }}</span>
      </button>
    </mat-menu>
  </div>
</div>
