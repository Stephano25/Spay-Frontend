<!-- frontend/src/app/components/admin/qr-scanner/qr-scanner.component.html -->
<div class="qr-scanner-overlay" (click)="close()">
  <mat-card class="qr-scanner-card" (click)="$event.stopPropagation()">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>qr_code_scanner</mat-icon>
        {{ 'Scanner un QR Code' | translate }}
      </mat-card-title>
      <button mat-icon-button (click)="close()" [matTooltip]="'Fermer' | translate">
        <mat-icon>close</mat-icon>
      </button>
    </mat-card-header>

    <mat-card-content>
      <div class="scanner-instructions">
        <mat-icon>info</mat-icon>
        <p>{{ 'Scannez le QR Code ou entrez le code manuellement' | translate }}</p>
      </div>

      <div class="scanner-input">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'Code QR ou données' | translate }}</mat-label>
          <input matInput [(ngModel)]="qrInput" placeholder="{{ 'Collez le code QR ici...' | translate }}" (keyup.enter)="scan()">
          <mat-icon matSuffix>qr_code</mat-icon>
        </mat-form-field>
      </div>

      <div class="scanner-actions">
        <button mat-stroked-button (click)="close()">
          <mat-icon>close</mat-icon>
          {{ 'Annuler' | translate }}
        </button>
        <button mat-raised-button color="primary" (click)="scan()" [disabled]="!qrInput || isScanning">
          <mat-spinner diameter="20" *ngIf="isScanning"></mat-spinner>
          <span *ngIf="!isScanning">
            <mat-icon>qr_code_scanner</mat-icon>
            {{ 'Scanner' | translate }}
          </span>
        </button>
      </div>

      <div class="or-divider">
        <span>{{ 'ou' | translate }}</span>
      </div>

      <div class="file-upload"
           [class.dragging]="isDragging"
           (dragover)="onDragOver($event)"
           (dragleave)="onDragLeave($event)"
           (drop)="onDrop($event)">
        <input type="file" accept="image/*" (change)="onFileSelected($event)" #fileInput style="display:none">
        <mat-icon>image</mat-icon>
        <span>{{ 'Glissez-déposez une image' | translate }}</span>
        <button mat-stroked-button (click)="fileInput.click()">
          <mat-icon>upload</mat-icon>
          {{ 'Importer une image' | translate }}
        </button>
        <span class="file-hint">PNG, JPG, WEBP</span>
      </div>
    </mat-card-content>
  </mat-card>
</div>
