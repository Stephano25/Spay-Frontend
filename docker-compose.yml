# ============================================================
# DOCKER COMPOSE - SPaye Frontend (Conteneur séparé)
# ============================================================

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaye-frontend
    ports:
      - "4200:80"
    restart: unless-stopped
    # ✅ Utiliser le réseau partagé avec le backend
    networks:
      - spaye-network

# ✅ Réseau partagé (doit exister, créé par le backend)
networks:
  spaye-network:
    external: true
    name: spaye-network