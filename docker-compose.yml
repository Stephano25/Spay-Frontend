# ============================================================
# DOCKER COMPOSE - SPaye Frontend
# ============================================================

version: '3.8'

services:
  # ── Frontend Angular ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaye-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      - API_URL=http://backend:3000/api
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3