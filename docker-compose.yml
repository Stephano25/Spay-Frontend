# ============================================================
# DOCKER COMPOSE - SPaye Frontend
# ============================================================

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaye-frontend
    ports:
      - "4200:80"
    restart: unless-stopped
    # ✅ Utiliser le réseau existant
    networks:
      - spaye-network

# ✅ Réseau externe (créé par le backend)
networks:
  spaye-network:
    external: true
    name: spaye-network